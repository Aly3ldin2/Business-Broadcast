kind = "web"
previewPath = "/"
title = "WhatsApp Broadcast"
version = "1.0.0"
id = "artifacts/wa-broadcast"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26033

[services.development]
run = "pnpm --filter @workspace/wa-broadcast run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wa-broadcast", "run", "build" ]
publicDir = "artifacts/wa-broadcast/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26033"
BASE_PATH = "/"

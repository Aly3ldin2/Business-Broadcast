openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: WhatsApp Real Estate Broadcast API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: campaign
    description: Quick broadcast campaign
  - name: gist
    description: GitHub Gist phone list storage
  - name: settings
    description: API credentials and settings
  - name: baileys
    description: WhatsApp Baileys connection management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /campaign/send:
    post:
      operationId: sendCampaign
      tags: [campaign]
      summary: Send broadcast to a list of phones
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignInput"
      responses:
        "200":
          description: Send result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignResult"

  /gist/phones:
    get:
      operationId: loadPhonesFromGist
      tags: [gist]
      summary: Load phone lists from GitHub Gist
      responses:
        "200":
          description: Phone lists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GistData"
    post:
      operationId: savePhonesToGist
      tags: [gist]
      summary: Save phone lists to GitHub Gist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GistData"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GistSaveResult"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get API settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: saveSettings
      tags: [settings]
      summary: Save API settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsInput"
      responses:
        "200":
          description: Saved settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /baileys/status:
    get:
      operationId: getBaileysStatus
      tags: [baileys]
      summary: Get Baileys WhatsApp connection status and QR code
      responses:
        "200":
          description: Baileys status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaileysStatus"

  /baileys/logout:
    post:
      operationId: baileysLogout
      tags: [baileys]
      summary: Disconnect and clear WhatsApp session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaileysLogoutResult"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      responses:
        '302':
          description: Redirect to the returnTo path on success.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Contact:
      type: object
      required: [number]
      properties:
        number:
          type: string
          description: Phone number in international format without "+" (e.g. 201012345678)
        name:
          type: ["string", "null"]
          description: Optional contact name

    MediaItem:
      type: object
      required: [type]
      properties:
        url:
          type: ["string", "null"]
          description: Public URL for the media
        id:
          type: ["string", "null"]
          description: Local media file ID (from upload endpoint)
        type:
          type: string
          enum: [image, video]

    MediaUploadResult:
      type: object
      required: [id]
      properties:
        id:
          type: string
          description: Local media file ID

    CampaignInput:
      type: object
      required: [phones]
      properties:
        phones:
          type: array
          items:
            type: string
          description: List of phone numbers in international format (e.g. 201012345678)
        message:
          type: string
          description: Optional message text. Sent as caption alongside media, or as standalone text if no media.
        mediaItems:
          type: array
          items:
            $ref: "#/components/schemas/MediaItem"
          description: Optional list of images/videos to send (appear above text as caption)

    CampaignResult:
      type: object
      required: [total, sent, failed, results]
      properties:
        total:
          type: integer
        sent:
          type: integer
        failed:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/MessageResult"

    MessageResult:
      type: object
      required: [phone, success]
      properties:
        phone:
          type: string
        success:
          type: boolean
        error:
          type: ["string", "null"]

    GistData:
      type: object
      required: [lists]
      properties:
        lists:
          type: array
          items:
            $ref: "#/components/schemas/PhoneList"

    PhoneList:
      type: object
      required: [name, phones]
      properties:
        name:
          type: string
        phones:
          type: array
          items:
            $ref: "#/components/schemas/Contact"

    GistSaveResult:
      type: object
      required: [success, gistId, gistUrl]
      properties:
        success:
          type: boolean
        gistId:
          type: string
        gistUrl:
          type: string

    Settings:
      type: object
      required: [isConfigured, hasGithubToken]
      properties:
        isConfigured:
          type: boolean
          description: true if WhatsApp (Baileys) is connected
        hasGithubToken:
          type: boolean
        gistId:
          type: ["string", "null"]

    SettingsInput:
      type: object
      properties:
        githubToken:
          type: string
        gistId:
          type: string

    BaileysStatus:
      type: object
      required: [connected]
      properties:
        connected:
          type: boolean
        qr:
          type: ["string", "null"]
          description: Base64 QR code data URL to display to the user

    BaileysLogoutResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

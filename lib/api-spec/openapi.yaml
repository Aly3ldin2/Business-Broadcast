openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: WhatsApp Real Estate Broadcast API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: campaign
    description: Quick broadcast campaign
  - name: gist
    description: GitHub Gist phone list storage
  - name: settings
    description: API credentials and settings
  - name: baileys
    description: WhatsApp Baileys connection management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /campaign/send:
    post:
      operationId: sendCampaign
      tags: [campaign]
      summary: Send broadcast to a list of phones
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignInput"
      responses:
        "200":
          description: Send result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignResult"

  /gist/phones:
    get:
      operationId: loadPhonesFromGist
      tags: [gist]
      summary: Load phone lists from GitHub Gist
      responses:
        "200":
          description: Phone lists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GistData"
    post:
      operationId: savePhonesToGist
      tags: [gist]
      summary: Save phone lists to GitHub Gist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GistData"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GistSaveResult"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get API settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: saveSettings
      tags: [settings]
      summary: Save API settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsInput"
      responses:
        "200":
          description: Saved settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /baileys/status:
    get:
      operationId: getBaileysStatus
      tags: [baileys]
      summary: Get Baileys WhatsApp connection status and QR code
      responses:
        "200":
          description: Baileys status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaileysStatus"

  /baileys/logout:
    post:
      operationId: baileysLogout
      tags: [baileys]
      summary: Disconnect and clear WhatsApp session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaileysLogoutResult"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Contact:
      type: object
      required: [number]
      properties:
        number:
          type: string
          description: Phone number in international format without "+" (e.g. 201012345678)
        name:
          type: ["string", "null"]
          description: Optional contact name

    MediaItem:
      type: object
      required: [type]
      properties:
        url:
          type: ["string", "null"]
          description: Public URL for the media
        id:
          type: ["string", "null"]
          description: Local media file ID (from upload endpoint)
        type:
          type: string
          enum: [image, video]

    MediaUploadResult:
      type: object
      required: [id]
      properties:
        id:
          type: string
          description: Local media file ID

    CampaignInput:
      type: object
      required: [phones, message]
      properties:
        phones:
          type: array
          items:
            type: string
          description: List of phone numbers in international format (e.g. 201012345678)
        message:
          type: string
          description: The message text
        mediaItems:
          type: array
          items:
            $ref: "#/components/schemas/MediaItem"
          description: Optional list of images/videos to send

    CampaignResult:
      type: object
      required: [total, sent, failed, results]
      properties:
        total:
          type: integer
        sent:
          type: integer
        failed:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/MessageResult"

    MessageResult:
      type: object
      required: [phone, success]
      properties:
        phone:
          type: string
        success:
          type: boolean
        error:
          type: ["string", "null"]

    GistData:
      type: object
      required: [lists]
      properties:
        lists:
          type: array
          items:
            $ref: "#/components/schemas/PhoneList"

    PhoneList:
      type: object
      required: [name, phones]
      properties:
        name:
          type: string
        phones:
          type: array
          items:
            $ref: "#/components/schemas/Contact"

    GistSaveResult:
      type: object
      required: [success, gistId, gistUrl]
      properties:
        success:
          type: boolean
        gistId:
          type: string
        gistUrl:
          type: string

    Settings:
      type: object
      required: [isConfigured, hasGithubToken]
      properties:
        isConfigured:
          type: boolean
          description: true if WhatsApp (Baileys) is connected
        hasGithubToken:
          type: boolean
        gistId:
          type: ["string", "null"]

    SettingsInput:
      type: object
      properties:
        githubToken:
          type: string
        gistId:
          type: string

    BaileysStatus:
      type: object
      required: [connected]
      properties:
        connected:
          type: boolean
        qr:
          type: ["string", "null"]
          description: Base64 QR code data URL to display to the user

    BaileysLogoutResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

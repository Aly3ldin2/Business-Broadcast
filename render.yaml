services:
  - type: web
    name: whatsapp-broadcast
    runtime: node
    plan: starter
    buildCommand: npm install -g pnpm && pnpm install && BASE_PATH=/ pnpm --filter @workspace/wa-broadcast run build && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    disk:
      name: app-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_PATH
        value: /
      - key: DATABASE_PATH
        value: /data/app.db
      - key: BAILEYS_AUTH_PATH
        value: /data/.baileys_auth
      - key: ALLOWED_ORIGIN
        sync: false
